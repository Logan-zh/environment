version: '3.9'
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    image: php:8.4-fpm
    container_name: php_app
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    expose:
      - 9000
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    container_name: nginx_app
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./src:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
